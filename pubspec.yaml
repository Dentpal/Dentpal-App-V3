name: dentpal
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.2.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  flutter_cache_manager: ^3.4.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  logger: ^2.6.1
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_face_detection: ^0.13.1
  tensorflow_face_verification: ^0.1.2
  http: ^1.1.0
  camera: ^0.10.5+9
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  image_picker: ^1.0.4


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - lib/assets/icons/dentpal_vertical.png
    - lib/assets/icons/facebook-logo.png
    - lib/assets/icons/google-logo.png
  fonts:
    - family: Poppins
      fonts:
        - asset: lib/assets/fonts/Poppins-Regular.ttf
    - family: Roboto
      fonts:
        - asset: lib/assets/fonts/Roboto-Black.ttf
          weight: 900
