name: dentpal
description: "Dentpal - The first dental e-commerce store for dental professionals and practitioners."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 3.0.0+3

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_database: ^12.0.2
  cloud_functions: ^6.0.3
  firebase_messaging: ^16.0.3
  flutter_local_notifications: ^18.0.1
  flutter_cache_manager: ^3.4.1
  cached_network_image: ^3.4.1
  image_picker: ^1.2.0
  image: ^4.3.0
  image_cropper: ^11.0.0
  mobile_scanner: ^7.1.2
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  logger: ^2.6.1
  photo_view: ^0.15.0
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_face_detection: ^0.13.1
  tensorflow_face_verification: ^0.1.2
  http: ^1.1.0
  camera: ^0.11.2
  path_provider: ^2.1.1
  permission_handler: ^12.0.1
  google_maps_flutter: ^2.5.0
  google_maps_flutter_web: ^0.5.4+2
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  url_launcher: ^6.2.1
  webview_flutter: ^4.4.2
  app_links: ^6.3.2
  share_plus: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - lib/assets/icons/dentpal_vertical.png
    - lib/assets/icons/facebook-logo.png
    - lib/assets/icons/google-logo.png
    - lib/assets/icons/dentpal_icon.png

  fonts:
    - family: Poppins
      fonts:
        - asset: lib/assets/fonts/Poppins-Regular.ttf
    - family: Roboto
      fonts:
        - asset: lib/assets/fonts/Roboto-Regular.ttf
          weight: 900

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/assets/icons/dentpal_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "lib/assets/icons/dentpal_icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "lib/assets/icons/dentpal_icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "lib/assets/icons/dentpal_icon.png"
